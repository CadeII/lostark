<title>싱글 코인 캐릭터별 편집 가능 체크리스트</title>
<style>
:root {
  --bg:#f6f7fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --line:#e5e7eb;
  --accent:#4f46e5; --soft:#eef2ff; --bonus:#fff7ed; --bonus-line:#fed7aa;
  --ok:#047857; --bad:#b91c1c; --danger:#dc2626;
}
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
main { max-width:1680px; margin:0 auto; padding:36px 26px 80px; }
h1 { margin:0 0 8px; font-size:30px; }
.notice { color:var(--muted); margin:0 0 20px; }
.toolbar { display:flex; flex-wrap:wrap; gap:8px; margin:16px 0 22px; }
button { border:0; border-radius:10px; padding:8px 11px; cursor:pointer; font-weight:700; background:var(--accent); color:white; }
button.secondary { background:#e5e7eb; color:#111827; }
button.danger { background:var(--danger); color:white; }
button.small { padding:5px 8px; font-size:12px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(470px,1fr)); gap:30px; }
.card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:24px; box-shadow:0 6px 20px rgba(15,23,42,.06); }
.card-head { display:flex; justify-content:space-between; align-items:center; gap:10px; }
.card h2 { margin:0; font-size:23px; }
.summary { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:18px 0; }
.stat { border:1px solid var(--line); border-radius:12px; padding:14px; background:#fafafa; }
.stat span { display:block; color:var(--muted); font-size:12px; }
.stat strong { font-size:16px; }
.plus { color:var(--ok); } .minus { color:var(--bad); }
.block { border-top:1px solid var(--line); padding-top:20px; margin-top:20px; }
.block h3 { margin:0 0 9px; font-size:16px; }
.block.bonus { background:var(--bonus); border:1px solid var(--bonus-line); border-radius:14px; padding:12px; }
.item { display:grid; grid-template-columns:30px 1fr 120px 52px; gap:12px; align-items:center; padding:8px 0; }
.item input[type="checkbox"] { width:17px; height:17px; }
.item input[type="text"], .item input[type="number"], .add-row input, .name-edit {
  width:100%; border:1px solid var(--line); border-radius:8px; padding:7px 8px; background:white; font:inherit;
}
.name-edit { font-size:20px; font-weight:800; }
.add-row { display:grid; grid-template-columns:1fr 120px 72px; gap:12px; margin-top:14px; }
.coin { color:var(--muted); font-size:12px; }
.empty { color:var(--muted); font-size:13px; padding:6px 0; }
.footer { margin-top:28px; color:var(--muted); font-size:13px; }
@media (max-width:640px) {
  .grid { grid-template-columns:1fr; }
  .item { grid-template-columns:24px 1fr; }
  .item input[type="number"], .item .delete { grid-column:auto; }
  .summary { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<main>
  <h1>싱글 코인 캐릭터별 편집 가능 체크리스트</h1>
  <p class="notice">필수/보너스 교환 아이템은 캐릭터별로 추가·삭제·수정할 수 있습니다. 체크 상태와 수정 내용은 이 브라우저에 자동 저장됩니다.</p>

  <div class="toolbar">
    <button onclick="resetAll()" class="danger">전체 초기화</button>
    <button onclick="exportData()" class="secondary">데이터 백업(JSON)</button>
    <button onclick="document.getElementById('importFile').click()" class="secondary">백업 불러오기</button>
    <input id="importFile" type="file" accept="application/json" hidden onchange="importData(event)">
  </div>

  <div id="app" class="grid"></div>
  <p class="footer">주의: GitHub Pages 같은 정적 HTML에서도 작동합니다. 단, 저장값은 현재 브라우저의 localStorage에 저장됩니다.</p>
</main>

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : structuredClone(defaultData);
  } catch(e) {
    return structuredClone(defaultData);
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function fmt(n) {
  return Number(n || 0).toLocaleString("ko-KR");
}

function sum(items, checkedOnly=false) {
  return items.reduce((acc, it) => acc + ((!checkedOnly || it.checked) ? Number(it.coin || 0) : 0), 0);
}

function itemRow(charIdx, type, item, itemIdx) {
  return `
    <div class="item">
      <input type="checkbox" ${item.checked ? "checked" : ""} onchange="toggleItem(${charIdx}, '${type}', ${itemIdx}, this.checked)">
      <input type="text" value="${escapeAttr(item.name)}" onchange="editItem(${charIdx}, '${type}', ${itemIdx}, 'name', this.value)">
      <input type="number" min="0" value="${Number(item.coin || 0)}" onchange="editItem(${charIdx}, '${type}', ${itemIdx}, 'coin', this.value)">
      <button class="small danger delete" onclick="deleteItem(${charIdx}, '${type}', ${itemIdx})">삭제</button>
    </div>`;
}

function escapeAttr(s) {
  return String(s ?? "").replaceAll("&","&amp;").replaceAll('"',"&quot;").replaceAll("<","&lt;").replaceAll(">","&gt;");
}

function sectionHtml(charIdx, type, title, cls="") {
  const items = data[charIdx][type] || [];
  const rows = items.length ? items.map((it, i) => itemRow(charIdx, type, it, i)).join("") : `<div class="empty">항목 없음</div>`;
  return `
    <section class="block ${cls}">
      <h3>${title}</h3>
      ${rows}
      <div class="add-row">
        <input id="add-name-${charIdx}-${type}" type="text" placeholder="추가할 항목명">
        <input id="add-coin-${charIdx}-${type}" type="number" min="0" placeholder="코인">
        <button class="small" onclick="addItem(${charIdx}, '${type}')">추가</button>
      </div>
    </section>`;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = data.map((ch, ci) => {
    const earned = sum(ch.earn, true);
    const spent = sum(ch.required, true) + sum(ch.bonus, true);
    const remain = earned - spent;
    const planned = sum(ch.required) + sum(ch.bonus);
    return `
      <article class="card">
        <div class="card-head">
          <input class="name-edit" value="${escapeAttr(ch.name)}" onchange="editCharacterName(${ci}, this.value)">
        </div>
        <div class="summary">
          <div class="stat"><span>체크 획득</span><strong>${fmt(earned)}</strong></div>
          <div class="stat"><span>체크 사용</span><strong>${fmt(spent)}</strong></div>
          <div class="stat"><span>잔여/부족</span><strong class="${remain >= 0 ? 'plus' : 'minus'}">${remain >= 0 ? '+' : ''}${fmt(remain)}</strong></div>
        </div>
        <div class="summary">
          <div class="stat"><span>등록된 필수+보너스</span><strong>${fmt(planned)}</strong></div>
          <div class="stat"><span>필수 체크</span><strong>${fmt(sum(ch.required, true))}</strong></div>
          <div class="stat"><span>보너스 체크</span><strong>${fmt(sum(ch.bonus, true))}</strong></div>
        </div>
        ${sectionHtml(ci, "earn", "코인 획득량 체크")}
        ${sectionHtml(ci, "required", "필수 교환 아이템")}
        ${sectionHtml(ci, "bonus", "보너스 교환 아이템", "bonus")}
      </article>`;
  }).join("");
}

function toggleItem(ci, type, ii, checked) {
  data[ci][type][ii].checked = checked;
  saveData(); render();
}

function editItem(ci, type, ii, field, value) {
  data[ci][type][ii][field] = field === "coin" ? Math.max(0, Number(value || 0)) : value;
  saveData(); render();
}

function editCharacterName(ci, value) {
  data[ci].name = value || "이름 없음";
  saveData(); render();
}

function addItem(ci, type) {
  const nameEl = document.getElementById(`add-name-${ci}-${type}`);
  const coinEl = document.getElementById(`add-coin-${ci}-${type}`);
  const name = nameEl.value.trim();
  const coin = Math.max(0, Number(coinEl.value || 0));
  if (!name) return alert("항목명을 입력하세요.");
  data[ci][type].push({ name, coin, checked:false });
  saveData(); render();
}

function deleteItem(ci, type, ii) {
  if (!confirm("이 항목을 삭제할까요?")) return;
  data[ci][type].splice(ii, 1);
  saveData(); render();
}

function resetAll() {
  if (!confirm("체크 상태와 수정한 항목을 모두 초기 상태로 되돌릴까요?")) return;
  data = structuredClone(defaultData);
  saveData(); render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "single_coin_checklist_backup.json";
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);
      if (!Array.isArray(imported)) throw new Error("Invalid data");
      data = imported;
      saveData(); render();
    } catch(e) {
      alert("불러오기 실패: JSON 형식이 올바르지 않습니다.");
    }
  };
  reader.readAsText(file);
}

render();
</script>
</body>
