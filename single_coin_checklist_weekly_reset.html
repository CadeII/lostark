<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>싱글 코인 캐릭터별 편집 가능 체크리스트</title>
<style>
:root {
  --bg:#f6f7fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --line:#e5e7eb;
  --accent:#4f46e5; --soft:#eef2ff; --bonus:#fff7ed; --bonus-line:#fed7aa;
  --ok:#047857; --bad:#b91c1c; --danger:#dc2626;
}
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
main { max-width:1680px; margin:0 auto; padding:36px 26px 80px; }
h1 { margin:0 0 8px; font-size:30px; }
.notice { color:var(--muted); margin:0 0 20px; }
.toolbar { display:flex; flex-wrap:wrap; gap:8px; margin:16px 0 22px; }
button { border:0; border-radius:10px; padding:8px 11px; cursor:pointer; font-weight:700; background:var(--accent); color:white; }
button.secondary { background:#e5e7eb; color:#111827; }
button.danger { background:var(--danger); color:white; }
button.small { padding:5px 8px; font-size:12px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(470px,1fr)); gap:30px; }
.card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:24px; box-shadow:0 6px 20px rgba(15,23,42,.06); }
.card-head { display:flex; justify-content:space-between; align-items:center; gap:10px; }
.card h2 { margin:0; font-size:23px; }
.summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin:18px 0; }
.stat { border:1px solid var(--line); border-radius:12px; padding:14px; background:#fafafa; }
.stat span { display:block; color:var(--muted); font-size:12px; }
.stat strong { font-size:16px; }
.plus { color:var(--ok); } .minus { color:var(--bad); }
.block { border-top:1px solid var(--line); padding-top:20px; margin-top:20px; }
.block h3 { margin:0 0 9px; font-size:16px; }
.block.bonus { background:var(--bonus); border:1px solid var(--bonus-line); border-radius:14px; padding:12px; }
.item { display:grid; grid-template-columns:30px 1fr 120px 52px; gap:12px; align-items:center; padding:8px 0; }
.item input[type="checkbox"] { width:17px; height:17px; }
.item input[type="text"], .item input[type="number"], .add-row input, .name-edit {
  width:100%; border:1px solid var(--line); border-radius:8px; padding:7px 8px; background:white; font:inherit;
}
.name-edit { font-size:20px; font-weight:800; }
.add-row { display:grid; grid-template-columns:1fr 120px 72px; gap:12px; margin-top:14px; }
.coin { color:var(--muted); font-size:12px; }
.empty { color:var(--muted); font-size:13px; padding:6px 0; }
.footer { margin-top:28px; color:var(--muted); font-size:13px; }
@media (max-width:640px) {
  .grid { grid-template-columns:1fr; }
  .item { grid-template-columns:24px 1fr; }
  .item input[type="number"], .item .delete { grid-column:auto; }
  .summary { grid-template-columns:1fr; }
}

.global-summary {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  margin:18px 0 26px;
}
.global-stat {
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px 20px;
  box-shadow:0 6px 20px rgba(15,23,42,.06);
}
.global-stat span {
  display:block;
  color:var(--muted);
  font-size:14px;
  margin-bottom:4px;
}
.global-stat strong {
  font-size:26px;
}


.card {
  position:relative;
}
.quick-summary {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:14px 0 6px;
}
.quick-pill {
  border:1px solid var(--line);
  background:#f9fafb;
  border-radius:999px;
  padding:6px 10px;
  font-size:13px;
  font-weight:700;
}
.quick-pill.plus { color:var(--ok); }
.quick-pill.minus { color:var(--bad); }
.block {
  border:1px solid var(--line);
  border-radius:14px;
  padding:0;
  margin-top:14px;
  overflow:hidden;
  background:#fff;
}
.block.bonus {
  border-color:var(--bonus-line);
  background:var(--bonus);
}
.block summary {
  list-style:none;
  cursor:pointer;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  font-weight:800;
  background:#fafafa;
}
.block.bonus summary {
  background:#fff7ed;
}
.block summary::-webkit-details-marker { display:none; }
.block summary::after {
  content:"펼치기";
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}
.block[open] summary::after {
  content:"접기";
}
.block-body {
  padding:14px 16px 16px;
}
.block-count {
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}
.earn-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
}
.earn-card {
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
  background:#f9fafb;
}
.earn-card label {
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:800;
  margin-bottom:8px;
}
.earn-card input[type="number"] {
  width:100%;
}


/* === improved coin earn layout === */
.earn-list {
  display:flex;
  flex-direction:column;
  gap:8px;
}
.earn-row {
  display:grid;
  grid-template-columns:28px minmax(80px,1fr) 110px 54px;
  gap:8px;
  align-items:center;
  border:1px solid var(--line);
  border-radius:12px;
  padding:9px 10px;
  background:#f9fafb;
}
.earn-row input[type="checkbox"] {
  width:18px;
  height:18px;
}
.earn-row input[type="text"],
.earn-row input[type="number"] {
  width:100%;
  border:1px solid var(--line);
  border-radius:9px;
  padding:8px 9px;
  background:white;
}
.earn-row .coin-input-wrap {
  position:relative;
}
.earn-row .coin-input-wrap::after {
  content:"코인";
  position:absolute;
  right:9px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  font-size:12px;
  pointer-events:none;
}
.earn-row input[type="number"] {
  padding-right:38px;
  text-align:right;
}
@media (max-width:560px) {
  .earn-row {
    grid-template-columns:28px 1fr 54px;
  }
  .earn-row .coin-input-wrap {
    grid-column:2 / 4;
  }
}

</style>
</head>

<main>
  <h1>싱글 코인 캐릭터별 편집 가능 체크리스트</h1>
  <p class="notice">필수/보너스 교환 아이템은 캐릭터별로 추가·삭제·수정할 수 있습니다. 체크 상태와 수정 내용은 이 브라우저에 자동 저장됩니다.</p>

  <div class="global-summary">
    <div class="global-stat">
      <span>현재 전체 사용 코인</span>
      <strong id="globalSpent">0</strong>
    </div>
    <div class="global-stat">
      <span>현재 전체 잔여 코인</span>
      <strong id="globalRemain" class="plus">+0</strong>
    </div>
  </div>


  <div class="toolbar">
    <button onclick="expandAll()" class="secondary">전체 펼치기</button>
    <button onclick="collapseAll()" class="secondary">전체 접기</button>
    <button onclick="resetAll()" class="danger">전체 체크 해제</button>
    <button onclick="exportData()" class="secondary">데이터 백업(JSON)</button>
    <button onclick="document.getElementById('importFile').click()" class="secondary">백업 불러오기</button>
    <input id="importFile" type="file" accept="application/json" hidden onchange="importData(event)">
  </div>

  <div id="app" class="grid"></div>
  <p class="footer">주의: GitHub Pages 같은 정적 HTML에서도 작동합니다. 단, 저장값은 현재 브라우저의 localStorage에 저장됩니다.</p>
</main>

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : structuredClone(defaultData);
  } catch(e) {
    return structuredClone(defaultData);
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function fmt(n) {
  return Number(n || 0).toLocaleString("ko-KR");
}

function sum(items, checkedOnly=false) {
  return items.reduce((acc, it) => acc + ((!checkedOnly || it.checked) ? Number(it.coin || 0) : 0), 0);
}

      <input type="checkbox" ${item.checked ? "checked" : ""} onchange="toggleItem(${charIdx}, '${type}', ${itemIdx}, this.checked)">
      <input type="text" value="${escapeAttr(item.name)}" onchange="editItem(${charIdx}, '${type}', ${itemIdx}, 'name', this.value)">
      <input type="number" min="0" value="${Number(item.coin || 0)}" onchange="editItem(${charIdx}, '${type}', ${itemIdx}, 'coin', this.value)">
      <button class="small danger delete" onclick="deleteItem(${charIdx}, '${type}', ${itemIdx})">삭제</button>
    </div>`;
}

function escapeAttr(s) {
  return String(s ?? "").replaceAll("&","&amp;").replaceAll('"',"&quot;").replaceAll("<","&lt;").replaceAll(">","&gt;");
}


function getOpenState() {
  const state = {};
  document.querySelectorAll("details.block[data-key]").forEach(el => {
    state[el.dataset.key] = el.open;
  });
  return state;
}

function applyOpenState(state) {
  document.querySelectorAll("details.block[data-key]").forEach(el => {
    const key = el.dataset.key;
    if (Object.prototype.hasOwnProperty.call(state, key)) {
      el.open = state[key];
    }
  });
}

function rerenderKeepOpen() {
  const state = getOpenState();
  saveData();
  render();
  applyOpenState(state);
}

function sectionHtml(charIdx, type, title, cls="") {
  const items = data[charIdx][type] || [];
  const checkedCount = items.filter(it => it.checked).length;
  const checkedCoin = sum(items, true);
  const totalCoin = sum(items, false);
  const openDefault = type === "earn" ? "open" : "";
  const key = `${charIdx}-${type}`;

  if (type === "earn") {
    const rows = items.length ? `
      <div class="earn-list">
        ${items.map((it, i) => `
          <div class="earn-row">
            <input type="checkbox" ${it.checked ? "checked" : ""} onchange="toggleItem(${charIdx}, '${type}', ${i}, this.checked)">
            <input type="text" value="${escapeAttr(it.name)}" onchange="editItem(${charIdx}, '${type}', ${i}, 'name', this.value)">
            <div class="coin-input-wrap">
              <input type="number" min="0" value="${it.coin}" onchange="editItem(${charIdx}, '${type}', ${i}, 'coin', this.value)">
            </div>
            <button class="small danger delete" onclick="deleteItem(${charIdx}, '${type}', ${i})">삭제</button>
          </div>
        `).join("")}
      </div>` : `<div class="empty">항목 없음</div>`;

    return `
      <details class="block ${cls}" data-key="${key}" ${openDefault}>
        <summary>
          <span>${title}</span>
          <span class="block-count">${checkedCount}/${items.length} · ${fmt(checkedCoin)} / ${fmt(totalCoin)} 코인</span>
        </summary>
        <div class="block-body">
          ${rows}
          <div class="add-row">
            <input id="add-name-${charIdx}-${type}" type="text" placeholder="예: 4막">
            <input id="add-coin-${charIdx}-${type}" type="number" min="0" placeholder="코인">
            <button class="small" onclick="addItem(${charIdx}, '${type}')">획득량 추가</button>
          </div>
        </div>
      </details>`;
  }

  const rows = items.length ? items.map((it, i) => itemRow(charIdx, type, it, i)).join("") : `<div class="empty">항목 없음</div>`;
  return `
    <details class="block ${cls}" data-key="${key}">
      <summary>
        <span>${title}</span>
        <span class="block-count">${checkedCount}/${items.length} · ${fmt(checkedCoin)} / ${fmt(totalCoin)} 코인</span>
      </summary>
      <div class="block-body">
        ${rows}
        <div class="add-row">
          <input id="add-name-${charIdx}-${type}" type="text" placeholder="추가할 항목명">
          <input id="add-coin-${charIdx}-${type}" type="number" min="0" placeholder="코인">
          <button class="small" onclick="addItem(${charIdx}, '${type}')">추가</button>
        </div>
      </div>
    </details>`;
}


// === extra 기본 아이템 추가 ===
data.forEach(ch=>{
  if(!ch.extra){
    ch.extra = [
      {name:"알키오네의 눈", coin:140, checked:false},
      {name:"베히모스의 비늘", coin:140, checked:false},
      {name:"업화의 쐐기돌", coin:200, checked:false},
      {name:"카르마의 잔영", coin:240, checked:false},
      {name:"우레의 뇌옥", coin:300, checked:false}
    ];
  }
});

function render() {
  const totalEarned = data.reduce((acc, ch) => acc + sum(ch.earn, true), 0);
  const totalSpent = data.reduce((acc, ch) => acc + sum(ch.required, true) + sum(ch.bonus, true) + sum(ch.extra || [], true), 0);
  const totalRemain = totalEarned - totalSpent;

  document.getElementById("globalSpent").textContent = fmt(totalSpent);
  const globalRemainEl = document.getElementById("globalRemain");
  globalRemainEl.textContent = `${totalRemain >= 0 ? '+' : ''}${fmt(totalRemain)}`;
  globalRemainEl.className = totalRemain >= 0 ? "plus" : "minus";

  const app = document.getElementById("app");
  app.innerHTML = data.map((ch, ci) => {
    const earned = sum(ch.earn, true);
    const spent = sum(ch.required, true) + sum(ch.bonus, true) + sum(ch.extra || [], true);
    const remain = earned - spent;
    const planned = sum(ch.required);
    return `
      <article class="card">
        <div class="card-head">
          <input class="name-edit" value="${escapeAttr(ch.name)}" onchange="editCharacterName(${ci}, this.value)">
        </div>
        <div class="quick-summary">
          <div class="quick-pill plus">획득 ${fmt(earned)}</div>
          <div class="quick-pill minus">사용 ${fmt(spent)}</div>
          <div class="quick-pill ${remain >= 0 ? 'plus' : 'minus'}">잔여 ${remain >= 0 ? '+' : ''}${fmt(remain)}</div>
        </div>
        <div class="summary">
          <div class="stat"><span>등록된 필수</span><strong>${fmt(planned)}</strong></div>
          <div class="stat"><span>필수 체크</span><strong>${fmt(sum(ch.required, true))}</strong></div>
          <div class="stat"><span>보너스 체크</span><strong>${fmt(sum(ch.bonus, true))}</strong></div>
          <div class="stat"><span>추가 체크</span><strong>${fmt(sum(ch.extra || [], true))}</strong></div>
        </div>
        ${sectionHtml(ci, "earn", "코인 획득량 수정 / 체크")}
        ${sectionHtml(ci, "required", "필수 교환 아이템")}
        ${sectionHtml(ci, "bonus", "보너스 교환 아이템", "bonus")}
        ${sectionHtml(ci, "extra", "추가 교환 아이템")}
      </article>`;
  }).join("");
}

function toggleItem(ci, type, ii, checked) {
  data[ci][type][ii].checked = checked;
  rerenderKeepOpen();
}

function editItem(ci, type, ii, field, value) {
  data[ci][type][ii][field] = field === "coin" ? Math.max(0, Number(value || 0)) : value;
  rerenderKeepOpen();
}

function editCharacterName(ci, value) {
  data[ci].name = value || "이름 없음";
  rerenderKeepOpen();
}

function addItem(ci, type) {
  const nameEl = document.getElementById(`add-name-${ci}-${type}`);
  const coinEl = document.getElementById(`add-coin-${ci}-${type}`);
  const name = nameEl.value.trim();
  const coin = Math.max(0, Number(coinEl.value || 0));
  if (!name) return alert("항목명을 입력하세요.");
  if(!data[ci][type]) data[ci][type] = [];
  data[ci][type].push({ name, coin, checked:false });
  rerenderKeepOpen();
}

function deleteItem(ci, type, ii) {
  if (!confirm("이 항목을 삭제할까요?")) return;
  data[ci][type].splice(ii, 1);
  rerenderKeepOpen();
}

function expandAll() {
  document.querySelectorAll("details.block").forEach(el => el.open = true);
}

function collapseAll() {
  document.querySelectorAll("details.block").forEach(el => el.open = false);
}

function resetAll() {
  if (!confirm("모든 캐릭터의 체크만 해제할까요?\n수정/추가/삭제한 항목은 유지됩니다.")) return;

  data.forEach(ch => {
    ["earn", "required", "bonus", "extra"].forEach(type => {
      if (Array.isArray(ch[type])) {
        ch[type].forEach(item => item.checked = false);
      }
    });
  });

  rerenderKeepOpen();
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "single_coin_checklist_backup.json";
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);
      if (!Array.isArray(imported)) throw new Error("Invalid data");
      data = imported;
      saveData(); render();
    } catch(e) {
      alert("불러오기 실패: JSON 형식이 올바르지 않습니다.");
    }
  };
  reader.readAsText(file);
}

render();
</script>

</html>
